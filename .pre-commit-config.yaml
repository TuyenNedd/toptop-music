repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix, --config, backend/pyproject.toml]
        files: ^backend/

      - id: ruff-format
        args: [--config, backend/pyproject.toml]
        files: ^backend/

  - repo: local
    hooks:
      - id: mypy
        name: mypy (backend)
        entry: bash -c 'cd backend && uv run mypy .'
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false

      - id: pytest
        name: pytest (backend)
        entry: bash -c 'cd backend && uv run pytest tests/ -x -q'
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false
        stages: [pre-push]
